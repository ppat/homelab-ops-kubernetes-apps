---
- op: add
  path: /spec/values/sso
  value:
    enabled: true
    enableSignup: true
    mergeAccountsByEmail: true
    enableRoleManagement: false
    enableGroupManagement: false
    oidc:
      enabled: true
      clientExistingSecret: openwebui-sso-credentials
      clientIdExistingSecretKey: oidc_openwebui_clientid
      clientExistingSecretKey: oidc_openwebui_clientsecret
      providerUrl: "https://auth.homelab.${dns_zone}/application/o/openwebui/.well-known/openid-configuration"
      providerName: "Authentik"
      scopes: "openid email profile"
- op: add
  path: /spec/values/extraEnvVars/-
  value:
    name: OPENID_REDIRECT_URI
    value: "https://openwebui.homelab.${dns_zone}/oauth/oidc/callback"
