---
fullnameOverride: external-dns-unifi
env: []
policy: sync
provider:
  name: webhook
  webhook:
    image:
      repository: ghcr.io/home-operations/external-dns-unifi-webhook
      # renovate: datasource=github-releases depName=home-operations/external-dns-unifi-webhook
      tag: "0.10.7"
    env:
    - name: UNIFI_HOST
      value: https://unifi.${dns_zone}
    - name: UNIFI_API_KEY
      valueFrom:
        secretKeyRef:
          name: external-dns-secrets
          key: unifi_apikey
    - name: LOG_LEVEL
      value: ${externaldns_loglevel:=debug}
    livenessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 10
      timeoutSeconds: 5
    readinessProbe:
      httpGet:
        path: /readyz
        port: http-webhook
      initialDelaySeconds: 10
      timeoutSeconds: 5
registry: txt
txtOwnerId: ${externaldns_txtowner_id:=k8s}
txtPrefix: ${externaldns_txtowner_prefix:=k8s}
