---
- op: add
  path: /spec/bootstrap/recovery
  value:
    database: ${db_bootstrap_database}
    owner: ${db_bootstrap_owner}
    source: origin
- op: remove
  path: /spec/bootstrap/initdb
- op: add
  path: /spec/externalClusters
  value:
  - name: origin
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: ${db_name}-backup-store
        serverName: ${db_suffix_restore}
