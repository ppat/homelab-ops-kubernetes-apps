---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud-release
  namespace: cnpg-system
spec:
  chart:
    spec:
      chart: plugin-barman-cloud
      interval: 24h0m0s
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg-repository
        namespace: flux-system
      version: 0.7.0
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
  interval: 30m0s
  releaseName: plugin-barman-cloud
  targetNamespace: cnpg-system
  timeout: 15m0s
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      ignoreTestFailures: false
      retries: 3
      strategy: rollback
  values:
    crds:
      create: true

    resources: {}
    tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
