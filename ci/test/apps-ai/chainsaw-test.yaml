---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: apps-ai
spec:
  steps:
  - name: Bootstrap FluxCD
    use:
      template: ../chainsaw/steps/bootstrap-flux.yaml

  - name: Bootstrap pre-requisites
    use:
      template: ../chainsaw/steps/bootstrap-prerequisites.yaml
      with:
        bindings:
        - name: prerequisites_path
          value: ./ci/test/apps-ai/pre-requisites

  - name: Reconcile pre-requisites
    try:
    - description: Reconcile helmrelease/infra-security-core
      script:
        # yamllint disable-line rule:line-length
        content: ../chainsaw/scripts/flux-reconcile.sh --resource-type=helmrelease --resource-name=external-secrets-release --namespace=external-secrets --timeout=4m
        timeout: 4m
    - description: Reconcile helmrelease/cloudnative-pg-release
      script:
        # yamllint disable-line rule:line-length
        content: ../chainsaw/scripts/flux-reconcile.sh --resource-type=helmrelease --resource-name=cloudnative-pg-release --namespace=cnpg-system --timeout=4m
        timeout: 4m
    - description: Reconcile helmrelease/dragonfly-operator-release
      script:
        # yamllint disable-line rule:line-length
        content: ../chainsaw/scripts/flux-reconcile.sh --resource-type=helmrelease --resource-name=dragonfly-operator-release --namespace=dragonfly-system --timeout=4m
        timeout: 4m

  - name: Apply apps-ai module
    try:
    - description: Apply apps-ai
      apply:
        file: ./apps-ai.yaml
    catch:
    - describe:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        name: apps-ai
        namespace: flux-system
    - events:
        namespace: flux-system

  - name: Validate ollama
    use:
      template: ./validate-ollama.yaml

  - name: Validate open-webui
    use:
      template: ./validate-open-webui.yaml

  - name: Validate litellm
    use:
      template: ./validate-litellm.yaml

  - name: Validate mcp-context7
    use:
      template: ./validate-mcp-context7.yaml

  - name: Validate mcp-playwright
    use:
      template: ./validate-mcp-playwright.yaml
