---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: validate-plugin-barman-cloud
spec:
  try:
  - description: Assert deployment/plugin-barman-cloud
    assert:
      bindings:
      - name: name
        value: plugin-barman-cloud
      - name: namespace
        value: cnpg-system
      file: ../chainsaw/assertions/deployment-ready.yaml
  - description: Assert helmrelease/plugin-barman-cloud-release
    assert:
      bindings:
      - name: name
        value: plugin-barman-cloud-release
      - name: namespace
        value: cnpg-system
      file: ../chainsaw/assertions/helmrelease-ready.yaml
  catch:
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: plugin-barman-cloud-release
      namespace: cnpg-system
  - describe:
      apiVersion: apps/v1
      kind: Deployment
      name: plugin-barman-cloud
      namespace: cnpg-system
  - podLogs:
      selector: app.kubernetes.io/name=plugin-barman-cloud
      namespace: cnpg-system
  - events:
      namespace: cnpg-system
