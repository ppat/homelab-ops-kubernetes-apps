---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: infra-database
spec:
  steps:
  - name: Bootstrap FluxCD
    use:
      template: ../chainsaw/steps/bootstrap-flux.yaml

  - name: Bootstrap pre-requisites
    use:
      template: ../chainsaw/steps/bootstrap-prerequisites.yaml
      with:
        bindings:
        - name: prerequisites_path
          value: ./ci/test/infra-database/pre-requisites

  - name: Reconcile pre-requisites
    try:
    - description: Reconcile helmrelease/cert-manager-release
      script:
        # yamllint disable-line rule:line-length
        content: ../chainsaw/scripts/flux-reconcile.sh --resource-type=helmrelease --resource-name=cert-manager-release --namespace=cert-manager --timeout=2m
        timeout: 2m
    - description: Reconcile helmrelease/external-secrets-release
      script:
        # yamllint disable-line rule:line-length
        content: ../chainsaw/scripts/flux-reconcile.sh --resource-type=helmrelease --resource-name=external-secrets-release --namespace=external-secrets --timeout=2m
        timeout: 2m
    - description: Reconcile kustomization/minio
      script:
        # yamllint disable-line rule:line-length
        content: ../chainsaw/scripts/flux-reconcile.sh --resource-type=kustomization --resource-name=minio --namespace=flux-system --timeout=3m
        timeout: 3m

  - name: Apply infra-database modules
    try:
    - description: Apply infra-database-core
      apply:
        file: ./infra-database-core.yaml
    catch:
    - describe:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        name: infra-database-core
        namespace: flux-system
    - events:
        namespace: flux-system

  - name: Validate cloudnative-pg
    use:
      template: ./validate-cloudnative-pg.yaml

  - name: Validate plugin-barman-cloud
    use:
      template: ./validate-plugin-barman-cloud.yaml

  - name: Validate dragonfly-operator
    use:
      template: ./validate-dragonfly-operator.yaml

  # ------------------------------------------------------------------
  # Baseline: a plain cluster with no backup component must stand up first.
  # ------------------------------------------------------------------
  - name: Apply basic postgres cluster
    try:
    - description: Apply test-postgres-db (no components)
      apply:
        file: ./test-resources/test-postgres-db-bare.yaml
    catch:
    - describe:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        name: test-postgres-db
        namespace: flux-system
    - events:
        namespace: default

  - name: Validate basic postgres cluster
    use:
      template: ./validate-test-postgres-db.yaml

  # ------------------------------------------------------------------
  # Layer the db-backups component onto the SAME cluster (in-place update,
  # not a new cluster) to prove backups can be added to a running database.
  # ------------------------------------------------------------------
  - name: Enable backups on postgres cluster
    try:
    - description: Apply test-postgres-db (with db-backups component)
      apply:
        file: ./test-resources/test-postgres-db-backup-enabled.yaml
    catch:
    - describe:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        name: test-postgres-db
        namespace: flux-system
    - events:
        namespace: default

  - name: Validate backups enabled
    use:
      template: ./validate-test-postgres-db-backup.yaml

  - name: Trigger on-demand backup
    try:
    - description: Apply test-postgres-db-on-demand backup
      apply:
        file: ./test-resources/test-postgres-db-on-demand-backup.yaml
    catch:
    - events:
        namespace: default

  - name: Validate on-demand backup completed
    use:
      template: ./validate-test-postgres-db-on-demand-backup.yaml

  # ------------------------------------------------------------------
  # Restore = same-namespace generation rotation (v1 -> v2): the new cluster
  # recovers from v1's backup while Flux prunes the old v1 cluster.
  # ------------------------------------------------------------------
  - name: Restore backup into new generation
    try:
    - description: Apply test-postgres-db (with db-backups + db-restore components)
      apply:
        file: ./test-resources/test-postgres-db-restore.yaml
    catch:
    - describe:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        name: test-postgres-db
        namespace: flux-system
    - events:
        namespace: default

  - name: Validate restored cluster
    use:
      template: ./validate-test-postgres-db-restore.yaml

  - name: Apply dragonfly test resources
    try:
    - description: Apply test-dragonfly-db-creds
      apply:
        file: ./test-resources/test-dragonfly-db-creds.yaml
    - description: Apply test-dragonfly-db
      apply:
        file: ./test-resources/test-dragonfly-db.yaml
    catch:
    - events:
        namespace: default

  - name: Validate test-dragonfly-db
    use:
      template: ./validate-test-dragonfly-db.yaml
