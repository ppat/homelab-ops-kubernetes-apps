---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: fake
spec:
  provider:
    fake:
      data:
      # minio ExternalSecret mappings (using common key patterns)
      - key: "minio_admin_username"
        value: "minio-root"
      - key: "minio_admin_password"
        value: "root-passwrd-placeholder"
      # cloudnativepg backup-credentials ExternalSecret mappings (components/db-backups)
      - key: "cluster_nas_minio_cloudnativepg_accesskeyid"
        value: "cloudnativepg"
      - key: "cluster_nas_minio_cloudnativepg_secretkey"
        value: "cloudnativepg-password-placeholder"
