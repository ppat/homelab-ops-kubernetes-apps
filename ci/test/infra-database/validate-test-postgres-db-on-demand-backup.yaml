---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: validate-test-postgres-db-on-demand-backup
spec:
  try:
  - description: Assert backup/test-postgres-db-on-demand completed
    assert:
      bindings:
      - name: name
        value: test-postgres-db-on-demand
      - name: namespace
        value: default
      file: ../chainsaw/assertions/cnpg-backup-completed.yaml
      timeout: 5m
  catch:
  # The Backup object carries the failure reason in status.error and names the
  # target instance pod in status.instanceID.podName.
  - describe:
      apiVersion: postgresql.cnpg.io/v1
      kind: Backup
      name: test-postgres-db-on-demand
      namespace: default
  - describe:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: test-postgres-db-v1
      namespace: default
  - describe:
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
      name: test-postgres-db-backup-store
      namespace: default
  # Instance pod state + BOTH containers. The barman-cloud sidecar container on the
  # INSTANCE pod (not the operator-side plugin deployment) is where base-backup and
  # WAL-archive errors actually surface - this is the log we were missing.
  - get:
      apiVersion: v1
      kind: Pod
      namespace: default
      selector: cnpg.io/cluster=test-postgres-db-v1
  - podLogs:
      selector: cnpg.io/cluster=test-postgres-db-v1
      namespace: default
      container: plugin-barman-cloud
      tail: 200
  - podLogs:
      selector: cnpg.io/cluster=test-postgres-db-v1
      namespace: default
      container: postgres
      tail: 100
  # Operator-side plugin logs (sidecar-injection lifecycle + backup orchestration).
  - podLogs:
      selector: app.kubernetes.io/name=plugin-barman-cloud
      namespace: cnpg-system
      tail: 100
  # Object-store contents: proves whether anything actually landed in fake S3.
  - podLogs:
      selector: app=minio
      namespace: minio
      tail: 50
  # Credential ground-truth. The backup fails with SignatureDoesNotMatch while the
  # access key IS accepted - so the SECRET barman signs with differs from the secret
  # minio provisioned user 'cloudnativepg' with (a mismatch), OR the two are identical
  # and the fault is in barman's request signing (SDK/checksum), not the credentials.
  # These two secrets are the decisive discriminator - decode both and compare. The
  # values are wrapped in [] so trailing whitespace/newlines are visible.
  #   barman-side: default/test-postgres-db-backup-credentials -> s3_secretaccesskey
  #   minio-side:  minio/minio-user-credentials -> cloudnativepg-secret-key
  - script:
      timeout: 60s
      # yamllint disable rule:line-length rule:indentation
      content: |
        BARMAN_AK=$(kubectl get secret test-postgres-db-backup-credentials -n default -o jsonpath='{.data.s3_accesskeyid}' | base64 -d)
        BARMAN_SK=$(kubectl get secret test-postgres-db-backup-credentials -n default -o jsonpath='{.data.s3_secretaccesskey}' | base64 -d)
        MINIO_SK=$(kubectl get secret minio-user-credentials -n minio -o jsonpath='{.data.cloudnativepg-secret-key}' | base64 -d)
        echo "barman access_key = [${BARMAN_AK}]"
        echo "barman secret_key = [${BARMAN_SK}]"
        echo "minio  secret_key = [${MINIO_SK}]"
        [ "${BARMAN_SK}" = "${MINIO_SK}" ] && echo "SECRETS_MATCH -> credentials fine; fault is barman request signing" || echo "SECRETS_DIFFER -> credential mismatch is the root cause"
      # yamllint enable rule:line-length rule:indentation
  - events:
      namespace: default
