---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: test-postgres-db
  namespace: flux-system
spec:
  interval: 15m0s
  path: ./ci/test/infra-database/test-resources/postgres-db
  components:
  - ../../../../../components/db-backups
  postBuild:
    substitute:
      db_name: test-postgres-db
      db_namespace: default
      db_suffix_current: v1
      db_bootstrap_database: test
      db_bootstrap_owner: test
      dns_zone: example.com
      secret_store: fake
  prune: true
  sourceRef:
    kind: GitRepository
    name: test-source
    namespace: flux-system
  timeout: 5m0s
  wait: false
  patches:
  # Point the ObjectStore at the in-cluster minio (fake S3) over plain http.
  #
  # Target by KIND ONLY - not by name. Flux applies spec.patches at kustomize-build
  # time, BEFORE postBuild.substitute runs, so at patch time the ObjectStore is still
  # literally named "${db_name}-backup-store" (substitution to
  # "test-postgres-db-backup-store" happens afterwards). A name-matched target would
  # silently no-op, leaving the production endpointURL (s3.nas.${dns_zone}) in place.
  # There is exactly one ObjectStore in this build, so a kind-only target is
  # unambiguous. The body name is the pre-substitution literal for self-consistency.
  #
  # NOTE: no trailing dot on the host. barman-cloud signs requests with boto3, which
  # folds the endpoint host into the SigV4 canonical request; a trailing-dot FQDN
  # (minio.minio.svc.cluster.local.) changes the signed Host header and makes MinIO
  # reject every request with SignatureDoesNotMatch. (aws/aws-cli#9023, botocore#2965)
  # yamllint disable-line rule:indentation
  - patch: |-
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
      metadata:
        name: ${db_name}-backup-store
      spec:
        configuration:
          endpointURL: http://minio.minio.svc.cluster.local:9000
    target:
      group: barmancloud.cnpg.io
      kind: ObjectStore
