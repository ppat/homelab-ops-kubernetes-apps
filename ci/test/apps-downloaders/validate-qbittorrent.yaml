---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: validate-qbittorrent
spec:
  try:
  - description: Assert deployment/qbittorrent
    assert:
      bindings:
      - name: name
        value: qbittorrent
      - name: namespace
        value: downloaders
      file: ../chainsaw/assertions/deployment-ready.yaml
  catch:
  - describe:
      apiVersion: apps/v1
      kind: Deployment
      name: qbittorrent
      namespace: downloaders
  - podLogs:
      selector: app.kubernetes.io/name=qbittorrent
      namespace: downloaders
      tail: 1000
  - events:
      namespace: downloaders
