---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: downloaders
  labels:
    app.kubernetes.io/name: seerr
  annotations:
    secret.reloader.stakater.com/reload: ${db_name:=downloaders-db}-${db_suffix_current:=default}-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seerr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seerr
    spec:
      automountServiceAccountToken: false
      containers:
      - name: seerr
        env:
        - name: LOG_LEVEL
          value: debug
        - name: TZ
          value: Etc/UTC
        - name: DB_TYPE
          value: postgres
        - name: DB_HOST
          value: downloaders-db.downloaders.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: seerr
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: ${db_name:=downloaders-db}-${db_suffix_current:=default}-app
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: ${db_name:=downloaders-db}-${db_suffix_current:=default}-app
              key: password
        image: ghcr.io/seerr-team/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /api/v1/settings/public
            port: 5055
          initialDelaySeconds: 20
        ports:
        - name: seerr
          containerPort: 5055
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /api/v1/settings/public
            port: 5055
          initialDelaySeconds: 20
        resources:
          requests:
            cpu: 15m
            memory: 100Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        volumeMounts:
        - mountPath: /app/config
          name: seerr-data
        - mountPath: /app/config/logs
          name: seerr-logs
        - mountPath: /tmp
          name: seerr-temp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      volumes:
      - name: seerr-data
        persistentVolumeClaim:
          claimName: seerr-data
      - name: downloader-config
        secret:
          secretName: downloader-config
          optional: true
      - name: seerr-logs
        emptyDir: {}
      - name: seerr-temp
        emptyDir: {}
