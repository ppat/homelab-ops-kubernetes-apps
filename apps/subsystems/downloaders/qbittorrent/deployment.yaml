---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: downloaders
  labels:
    app.kubernetes.io/name: qbittorrent
  annotations:
    configmap.reloader.stakater.com/reload: "gluetun-config"
    secret.reloader.stakater.com/reload: "gluetun-secrets"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      automountServiceAccountToken: false
      initContainers:
      # Native sidecar: starts before qbittorrent and keeps running alongside it.
      # qbittorrent will not start until this container's readiness probe passes,
      # ensuring all traffic is routed through the VPN tunnel.
      - name: gluetun
        image: qmcgaw/gluetun:v3.41.1
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        envFrom:
        - configMapRef:
            name: gluetun-config
            optional: true
        - secretRef:
            name: gluetun-secrets
            optional: true
        env:
        # Allow inbound traffic on the default (eth0) interface so that:
        #   - *arr apps (Radarr/Sonarr) can reach the qBittorrent WebUI (8080)
        #   - the Kubernetes liveness/readiness probes can reach the health endpoint (9999)
        - name: FIREWALL_INPUT_PORTS
          value: "8080,9999"
        - name: TZ
          value: Etc/UTC
        livenessProbe:
          httpGet:
            path: /
            port: 9999
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 9999
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          # NET_ADMIN is required to configure the WireGuard tunnel and firewall rules.
          # privileged is required in Kubernetes to open the TUN device.
          # runAsUser/runAsNonRoot are overridden here because gluetun must run as root
          # to manipulate iptables rules, regardless of the pod-level security context.
          privileged: true
          runAsNonRoot: false
          runAsUser: 0
          capabilities:
            add:
            - NET_ADMIN
        volumeMounts:
        - mountPath: /tmp
          name: gluetun-temp
      containers:
      - name: qbittorrent
        env:
        - name: TZ
          value: Etc/UTC
        - name: QBT_WEBUI_PORT
          value: "8080"
        # Torrenting port is managed dynamically by gluetun's VPN_PORT_FORWARDING_UP_COMMAND.
        # ProtonVPN assigns a forwarded port via NAT-PMP; gluetun updates qBittorrent
        # automatically when the port changes.
        image: ghcr.io/home-operations/qbittorrent:5.2.1
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /api/v2/app/version
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
        ports:
        - name: qbittorrent
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /api/v2/app/version
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        startupProbe:
          httpGet:
            path: /api/v2/app/version
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        volumeMounts:
        - mountPath: /config
          name: qbittorrent-data
        - mountPath: /data
          name: qbittorrent-media
        - mountPath: /tmp
          name: qbittorrent-temp
      securityContext:
        runAsNonRoot: true
        runAsUser: ${media_writer_uid}
        runAsGroup: ${media_writer_gid}
        fsGroup: ${media_writer_gid}
        fsGroupChangePolicy: OnRootMismatch
      volumes:
      - name: qbittorrent-data
        persistentVolumeClaim:
          claimName: qbittorrent-data
      - name: qbittorrent-media
        persistentVolumeClaim:
          claimName: media
      - name: qbittorrent-temp
        emptyDir: {}
      - name: gluetun-temp
        emptyDir: {}
