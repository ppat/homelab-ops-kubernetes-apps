---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-unifi-network
  namespace: ai
  labels:
    app.kubernetes.io/name: mcp-unifi-network
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-unifi-network
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-unifi-network
    spec:
      automountServiceAccountToken: false
      containers:
      - name: mcp-unifi-network
        image: ghcr.io/sirkirby/unifi-network-mcp:0.24.1@sha256:4d15874fa5ec0c028bd2557d8725d22a831dadfa28d87987c49be91bb20245ee
        imagePullPolicy: IfNotPresent
        env:
        - name: UNIFI_MCP_HTTP_ENABLED
          value: "true"
        - name: UNIFI_MCP_HOST
          value: "0.0.0.0"
        - name: UNIFI_MCP_PORT
          value: "3000"
        - name: UNIFI_MCP_ALLOWED_HOSTS
          value: mcp-unifi-network.ai.svc.cluster.local,localhost,127.0.0.1
        - name: UNIFI_TOOL_REGISTRATION_MODE
          value: eager
        - name: UNIFI_POLICY_NETWORK_CREATE
          value: "false"
        - name: UNIFI_POLICY_NETWORK_UPDATE
          value: "false"
        - name: UNIFI_POLICY_NETWORK_DELETE
          value: "false"
        - name: UNIFI_NETWORK_HOST
          value: unifi.nodes.${domain_name}
        - name: UNIFI_NETWORK_VERIFY_SSL
          value: "true"
        - name: UNIFI_NETWORK_USERNAME
          valueFrom:
            secretKeyRef:
              name: mcp-unifi-network-secrets
              key: UNIFI_NETWORK_USERNAME
        - name: UNIFI_NETWORK_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mcp-unifi-network-secrets
              key: UNIFI_NETWORK_PASSWORD
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        # No documented health endpoint for this image; fall back to a TCP check.
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 384Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      # Not setting runAsNonRoot: the upstream image's Dockerfile doesn't declare
      # a USER, so it runs as root by default and there's no numeric UID to pin.
      securityContext: {}
