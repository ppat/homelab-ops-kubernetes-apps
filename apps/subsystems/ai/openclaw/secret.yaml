---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
spec:
  data:
  - secretKey: OPENCLAW_GATEWAY_TOKEN
    remoteRef:
      key: openclaw_gateway_token
  - secretKey: LITELLM_KEY
    remoteRef:
      key: apikey_litellm_openclaw
  - secretKey: OPENCLAW_HOOKS_TOKEN
    remoteRef:
      key: openclaw_hooks_token
  # Owner's WhatsApp E.164 number for channels.whatsapp.allowFrom -- treated as sensitive
  # (personal identifying data), not listed alongside the module's other plain postBuild
  # vars. Substituted into openclaw.json at container startup (see configmap.yaml), not
  # by Flux -- that ConfigMap has postBuild substitution disabled.
  - secretKey: OWNER_WHATSAPP_NUMBER
    remoteRef:
      key: openclaw_owner_whatsapp_number
  refreshInterval: 24h
  secretStoreRef:
    name: ${secret_store}
    kind: ClusterSecretStore
