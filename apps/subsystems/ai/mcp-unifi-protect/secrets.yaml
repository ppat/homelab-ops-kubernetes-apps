---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-unifi-protect-secrets
  namespace: ai
spec:
  data:
  - secretKey: UNIFI_PROTECT_USERNAME
    remoteRef:
      key: unifi_protect_username_mcp
  - secretKey: UNIFI_PROTECT_PASSWORD
    remoteRef:
      key: unifi_protect_password_mcp
  refreshInterval: 24h
  secretStoreRef:
    name: ${secret_store}
    kind: ClusterSecretStore
