---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-unifi-protect
  namespace: ai
  labels:
    app.kubernetes.io/name: mcp-unifi-protect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-unifi-protect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-unifi-protect
    spec:
      automountServiceAccountToken: false
      containers:
      - name: mcp-unifi-protect
        image: ghcr.io/sirkirby/unifi-protect-mcp:0.7.2@sha256:dabe1b0f0457d832463054b46ffa97813b9036bf10586332333c025e37e37131
        imagePullPolicy: IfNotPresent
        env:
        - name: UNIFI_MCP_HTTP_ENABLED
          value: "true"
        - name: UNIFI_MCP_HOST
          value: "0.0.0.0"
        - name: UNIFI_MCP_PORT
          value: "3001"
        - name: UNIFI_MCP_ALLOWED_HOSTS
          value: mcp-unifi-protect.ai.svc.cluster.local,localhost,127.0.0.1
        - name: UNIFI_TOOL_REGISTRATION_MODE
          value: eager
        - name: UNIFI_POLICY_PROTECT_CREATE
          value: "false"
        - name: UNIFI_POLICY_PROTECT_UPDATE
          value: "false"
        - name: UNIFI_POLICY_PROTECT_DELETE
          value: "false"
        - name: UNIFI_PROTECT_HOST
          value: unifi.nodes.${dns_zone}
        - name: UNIFI_PROTECT_VERIFY_SSL
          value: "true"
        - name: UNIFI_PROTECT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mcp-unifi-protect-secrets
              key: UNIFI_PROTECT_USERNAME
        - name: UNIFI_PROTECT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mcp-unifi-protect-secrets
              key: UNIFI_PROTECT_PASSWORD
        ports:
        - name: http
          containerPort: 3001
          protocol: TCP
        # No documented health endpoint for this image; fall back to a TCP check.
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 384Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      # Not setting runAsNonRoot: the upstream image's Dockerfile doesn't declare
      # a USER, so it runs as root by default and there's no numeric UID to pin.
      securityContext: {}
