---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-home-assistant
  namespace: ai
  labels:
    app.kubernetes.io/name: mcp-home-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-home-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-home-assistant
    spec:
      automountServiceAccountToken: false
      containers:
      - name: mcp-home-assistant
        image: ghcr.io/homeassistant-ai/ha-mcp:7.14.2@sha256:7917b2d385e16e43f45f92fc72a757e5c0aec8d88b3cd69fe64f3b5106cbfe36
        imagePullPolicy: IfNotPresent
        # Default CMD serves stdio; ha-mcp-web selects the streamable-HTTP server instead.
        command:
        - ha-mcp-web
        env:
        - name: MCP_HOST
          value: "0.0.0.0"
        - name: MCP_PORT
          value: "8086"
        - name: MCP_HEALTHZ
          value: "true"
        - name: READ_ONLY_MODE
          value: "false"
        - name: ENABLE_BETA_FEATURES
          value: "true"
        - name: ENABLE_YAML_CONFIG_EDITING
          value: "true"
        - name: ENABLE_CODE_MODE
          value: "true"
        - name: HOMEASSISTANT_URL
          value: http://home-assistant.home-automation.svc.cluster.local:8123
        - name: HOMEASSISTANT_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-home-assistant-secrets
              key: HOMEASSISTANT_TOKEN
        ports:
        - name: http
          containerPort: 8086
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      # Not setting runAsNonRoot: the image declares USER mcpuser (a name, not a
      # numeric UID), so the kubelet can't verify non-root without also knowing
      # the numeric UID, and no image-inspection tooling is available here to
      # confirm it.
      securityContext: {}
