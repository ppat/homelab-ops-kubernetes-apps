---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: context7-mcp
  namespace: ai
  labels:
    app.kubernetes.io/name: context7-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: context7-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: context7-mcp
    spec:
      automountServiceAccountToken: false
      containers:
      - name: context7-mcp
        # Upstash doesn't publish an official ghcr.io/Docker Hub image under its own
        # namespace for self-hosting (only the npm package and a private ECR image).
        # This is Docker Inc's "MCP Catalog" build of the same upstream Dockerfile
        # (https://github.com/upstash/context7/blob/f2f367d8913843bd28b2a96a6ce860f43e3fc3ca/Dockerfile),
        # pinned by digest since upstream only publishes a floating `latest` tag.
        image: mcp/context7@sha256:1174e6a29634a83b2be93ac1fefabf63265f498c02c72201fe3464e687dd8836
        imagePullPolicy: IfNotPresent
        env:
        - name: CONTEXT7_API_KEY
          valueFrom:
            secretKeyRef:
              name: context7-mcp-secrets
              key: CONTEXT7_API_KEY
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        # No documented health endpoint for this image; fall back to a TCP check.
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          # Not setting runAsNonRoot/readOnlyRootFilesystem: the pinned image's
          # Dockerfile doesn't declare a USER, so root can't be ruled out, and its
          # runtime filesystem-write needs aren't documented upstream.
