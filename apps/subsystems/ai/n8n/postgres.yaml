---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ${n8n_db_name:=n8n-db}-${n8n_db_suffix_current:=default}
  namespace: n8n
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  bootstrap:
    initdb:
      database: ${n8n_db_bootstrap_database:=n8n}
      owner: ${n8n_db_bootstrap_owner:=n8n}
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4
  instances: ${n8n_db_replicas:=1}
  monitoring:
    enablePodMonitor: true
  primaryUpdateStrategy: unsupervised
  resources: {}
  startDelay: 300
  stopDelay: 300
  storage:
    size: ${n8n_db_storage_size}
    storageClass: ${n8n_db_storage_class}
