---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-kubernetes
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-kubernetes-view
# Binds the stock, built-in "view" ClusterRole rather than a custom one: it
# already hard-excludes core Secrets at the RBAC layer. The remaining
# sensitive-but-not-Secret resources (ServiceAccounts, ExternalSecret and
# friends) aren't covered by "view" and are blocked instead at the MCP layer
# via config.toml's denied_resources.
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: mcp-kubernetes
  namespace: ai
