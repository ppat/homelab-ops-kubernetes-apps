---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kubernetes
  namespace: ai
  labels:
    app.kubernetes.io/name: mcp-kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-kubernetes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-kubernetes
    spec:
      serviceAccountName: mcp-kubernetes
      automountServiceAccountToken: true
      containers:
      - name: mcp-kubernetes
        image: ghcr.io/containers/kubernetes-mcp-server:v0.0.65@sha256:5df586e2c7ced2a3125f6e78923388d80b69de0a2ad1470325b05318f12725bd
        imagePullPolicy: IfNotPresent
        args:
        - --port
        - "8080"
        - --config
        - /etc/kubernetes-mcp-server/config.toml
        env:
        - name: HOME
          value: /tmp
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/kubernetes-mcp-server
          readOnly: true
        - name: tmp
          mountPath: /tmp
        # This server runs in-cluster (cluster API is reachable), so /healthz
        # reflects real readiness rather than falling back to a TCP-only check.
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: config
        configMap:
          name: mcp-kubernetes-config
      - name: tmp
        emptyDir: {}
