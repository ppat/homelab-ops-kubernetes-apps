---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: harbor-redis
  namespace: harbor
spec:
  args:
  - --maxmemory=$(MAX_MEMORY)Mi
  - --proactor_threads=1
  - --cluster_mode=emulated
  - --lock_on_hashtags
  authentication:
    passwordFromSecret:
      name: harbor
      key: REDIS_PASSWORD
  env:
  - name: MAX_MEMORY
    valueFrom:
      resourceFieldRef:
        resource: limits.memory
        divisor: 1Mi
  image: ghcr.io/dragonflydb/dragonfly:v1.37.0@sha256:84b1009aee0b68327758bce8e99ed514f782d713353acc46caf5738feaa481d6
  replicas: ${redis_replicas:=1}
  resources:
    requests:
      cpu: 32m
      memory: 100Mi
    limits:
      memory: 256Mi
