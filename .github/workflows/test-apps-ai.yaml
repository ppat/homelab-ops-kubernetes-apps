---
# yamllint disable rule:line-length
name: test-apps-ai

on:
  pull_request:
    paths:
    - '.github/workflows/test-apps-ai.yaml'
    - '.github/kind-cluster-single-node.yaml'
    - 'ci/test/apps-ai/**'
    - 'apps/subsystems/ai/**'
    - '!apps/subsystems/ai/**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-apps-ai:
    uses: ppat/github-workflows/.github/workflows/chainsaw-test.yaml@10103e49c72fbd6d3e06d7e29f51815b9b8644a6 # v4.2.0
    with:
      git_ref: ${{ github.head_ref || github.ref }}
      test_path: ./ci/test/apps-ai
      chainsaw_config: ./ci/test/chainsaw/.chainsaw.yaml
      kind_config: .github/kind-cluster-single-node.yaml
      # Raised from the 15m default: this suite now stands up TWO CloudNativePG Postgres
      # clusters (litellm's and n8n's), and CNPG initdb + first-boot n8n migrations are the
      # long pole (n8n's Deployment assert alone budgets 8m and only starts ~7m in, after the
      # other component validations). 15m cancels the job before n8n is Ready and openclaw is
      # even reached.
      timeout: 25
